# Legacy Render Blueprint (optional). This repo deploys on Railway — use Railway variables + Dockerfile.
# https://render.com/docs/blueprint-spec
#
# Environment (set in UI when sync: false, or use values below):
#   TELEGRAM_BOT_TOKEN — @BotFather token (for app.telegram_bot; optional if API-only)
#   WEB_APP_URL        — public URL of this web service, no trailing slash
#                        e.g. https://ptormtorbot-api.onrender.com  (for Mini App + /start)
#                        If unset, the app also uses Render's RENDER_EXTERNAL_URL when set.
#   CORS_ORIGINS       — optional; comma-separated extra origins (e.g. https://my.netlify.app)
#                        If unset, app allows * (see app/main.py)
#   ADMIN_TELEGRAM_IDS — comma-separated Telegram user IDs allowed to open the admin Mini App
#   ADMIN_API_SECRET   — optional fallback secret for browser access outside Telegram
#   DATA_DIR           — optional; set to /data only after adding a paid Render Disk.
#                        Free web services use ephemeral storage, so admin history resets after restart.

services:
  - type: web
    name: ptormtorbot-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: ADMIN_API_SECRET
        sync: false
      - key: NOWPAYMENTS_API_KEY
        sync: false
      - key: NOWPAYMENTS_IPN_SECRET
        sync: false
      - key: RATE_PREVIEW_PER_HOUR
        sync: false
      - key: RATE_FINAL_PER_DAY
        sync: false
      - key: RATE_INVOICE_PER_HOUR
        sync: false
      - key: RATE_REDEEM_PER_HOUR
        sync: false
