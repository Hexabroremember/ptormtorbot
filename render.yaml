# Deploy without GitHub: build image locally, push to Docker Hub (or GHCR), then create a
# Render "Existing Docker Image" service pointing at your image tag.
#
# Optional env in Dashboard:
#   WEB_APP_URL = https://<your-service>.onrender.com   (for Telegram Mini App button)

services:
  - type: web
    name: ptormtorbot-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEB_APP_URL
        sync: false
