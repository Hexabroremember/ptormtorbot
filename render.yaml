services:
  - type: web
    name: ptormtorbot-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: CORS_ORIGINS
        value: "https://beautiful-taiyaki-9e0028.netlify.app"
      - key: PAYMENT_ADMIN_TELEGRAM_IDS
        value: "5319095718"
